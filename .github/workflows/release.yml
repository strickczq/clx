name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build each platform binary and stash it as an artifact. These jobs do NOT
  # touch the Releases API — concurrent matrix jobs racing to create the same
  # release is a known issue, so a single job below publishes them together.
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: tar -czf clx-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release clx

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: clx-${{ matrix.target }}
          path: clx-${{ matrix.target }}.tar.gz

  # Single publishing job — downloads every platform's artifact and uploads them
  # to one release in a single action call (the aggregator pattern).
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: clx-*/clx-*.tar.gz
          body: |
            Release ${{ github.ref_name }}
